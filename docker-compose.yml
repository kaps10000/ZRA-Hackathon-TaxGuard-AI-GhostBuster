version: '3.8'
services:
  api:
    build: ./dashboard_integration/api_integration
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production

  frontend:
    build: ./dashboard_integration/frontend
    ports:
      - '3000:80' # serve production build via nginx on 3000
    depends_on:
      - api
