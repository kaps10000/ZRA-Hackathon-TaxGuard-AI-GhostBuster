# =====================================================
# ZRA TaxGuard - Docker Compose Configuration
# =====================================================
# Complete microservices stack:
# - PostgreSQL Database
# - OCR AI Service (Python/FastAPI)
# - OCR Backend (Node.js)
# - Blockchain Service
# - Frontend (React/Vue)
# =====================================================

services:
  # =====================================================
  # PostgreSQL Database
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: zra-postgres
    environment:
      POSTGRES_DB: zra_taxguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zrapassword
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ocr-backend/database/migrations:/docker-entrypoint-initdb.d
    networks:
      - zra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # OCR AI Service (Python/FastAPI)
  # =====================================================
  ocr-ai-service:
    build:
      context: ./ocr-ai-service
      dockerfile: Dockerfile
      target: production
    container_name: zra-ocr-ai-service
    environment:
      - DEBUG=false
      - PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=zra_taxguard
      - DB_USER=postgres
      - DB_PASSWORD=zrapassword
      - BACKEND_URL=http://ocr-backend:5000
      - BLOCKCHAIN_URL=http://blockchain-service:3001
      - TESSERACT_PATH=/usr/bin/tesseract
      - ENABLE_PREPROCESSING=true
      - RISK_LOW_THRESHOLD=70.0
      - RISK_MEDIUM_THRESHOLD=50.0
      - RISK_HIGH_THRESHOLD=30.0
    ports:
      - "8000:8000"
    volumes:
      - ./ocr-ai-service/uploads:/app/uploads
      - ./ocr-ai-service/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zra-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # =====================================================
  # OCR Backend (Node.js)
  # =====================================================
  ocr-backend:
    build:
      context: ./ocr-backend
      dockerfile: Dockerfile
    container_name: zra-ocr-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=zra_taxguard
      - DB_USER=postgres
      - DB_PASSWORD=zrapassword
      - DB_SCHEMA=ocr
      - OCR_AI_SERVICE_URL=http://ocr-ai-service:8000
      - BLOCKCHAIN_SERVICE_URL=http://blockchain-service:3001
      - JWT_SECRET=zra_jwt_secret_key_change_in_production
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    ports:
      - "5000:5000"
    volumes:
      - ./ocr-backend/uploads:/app/uploads
      - ./ocr-backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      ocr-ai-service:
        condition: service_healthy
    networks:
      - zra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # =====================================================
  # Blockchain Service
  # =====================================================
  blockchain-service:
    build:
      context: ./blockchain
      dockerfile: Dockerfile
    container_name: zra-blockchain-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=zra_taxguard
      - DB_USER=postgres
      - DB_PASSWORD=zrapassword
      - PRIVATE_KEY=0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
      - BLOCKCHAIN_NETWORK=sepolia
      - CONTRACT_ADDRESS=0x0000000000000000000000000000000000000000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # =====================================================
  # Frontend (React/Vue)
  # =====================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zra-frontend
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_BLOCKCHAIN_URL=http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - ocr-backend
      - blockchain-service
    networks:
      - zra-network
    restart: unless-stopped

# =====================================================
# Networks
# =====================================================
networks:
  zra-network:
    driver: bridge
    name: zra-taxguard-network

# =====================================================
# Volumes
# =====================================================
volumes:
  postgres_data:
    name: zra-postgres-data
