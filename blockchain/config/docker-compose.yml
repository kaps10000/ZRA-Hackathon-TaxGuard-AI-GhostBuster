version: '3.8'

services:
  # TaxGuard Blockchain API
  blockchain-api:
    build: 
      context: ../
      dockerfile: Dockerfile
    container_name: taxguard-blockchain
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - blockchain_data:/app/data
    networks:
      - taxguard-network
    depends_on:
      - postgres
    restart: unless-stopped

  # PostgreSQL for off-chain data
  postgres:
    image: postgres:13-alpine
    container_name: taxguard-postgres
    environment:
      POSTGRES_DB: taxguard
      POSTGRES_USER: taxguard
      POSTGRES_PASSWORD: taxguard123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - taxguard-network
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: taxguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - taxguard-network
    restart: unless-stopped

  # Blockchain Explorer UI
  explorer:
    build:
      context: ../explorer
      dockerfile: Dockerfile
    container_name: taxguard-explorer
    ports:
      - "3002:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    networks:
      - taxguard-network
    depends_on:
      - blockchain-api
    restart: unless-stopped

networks:
  taxguard-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  blockchain_data:
